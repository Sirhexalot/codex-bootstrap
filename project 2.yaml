bootstrap:
  name: "codex-agent-bootstrap"
  version: "0.1.0"
  initialized_at: null
  manifest: ".bootstrap/manifest.json"

project:
  name: "AI Coworker Agent"
  customer: "Adrian / noch zu klaerendes Team"
  purpose: "Einen AI-Coworker aufbauen, der nicht nur antwortet, sondern wiederkehrende Arbeit ueber Tools, Memory, Automatisierungen und konkrete Artefakte erledigt."
  owner: "Adrian"
  status: "initialized"
  language: "de"

agent:
  default_tone: "freundlich, praezise, pragmatisch, coworker-artig"
  autonomy_level: "confirm_before_external_actions"
  risk_level: "medium"
  primary_users:
    - "Adrian"
    - "spaeter: Teammitglieder oder Kunden"
  out_of_scope:
    - "Keine externen Aktionen mit Wirkung auf Kunden, Konten, Daten oder Kosten ohne klare Freigabe."
    - "Keine Zugangsdaten, API Keys oder Tokens in Projektdateien speichern."
    - "Keine Automatisierungen produktiv laufen lassen, bevor Zweck, Zugriff und Abbruchkriterien dokumentiert sind."

memory:
  long_term_memory: "Memory MCP Server"
  project_memory: "Memory.md"
  automation_memory_required: true
  update_project_memory_on_relevant_changes: true

folders:
  automations: "automations"
  docs: "docs"
  skills: "skills"
  templates: "templates"

tools:
  required:
    - "Codex"
    - "Memory MCP Server"
  optional:
    - "Composio"
    - "MarkItDown MCP"
    - "Apple Calendar MCP"
    - "Apple Mail MCP"
    - "Microsoft Teams MCP via floriscornel/teams-mcp"
    - "Slack als moeglicher alternativer Coworker-Kanal"
    - "Google Workspace, GitHub, CRM, Ads, Analytics oder weitere Kundentools je nach Use Case"

onboarding:
  first_prompt: "Bitte initialisiere dieses Projekt als Kunden-Agent."
  read_first:
    - "START_HERE.md"
    - "AGENTS.md"
    - "Memory.md"
    - "project.yaml"
    - "docs/customer-context.md"

heartbeat:
  enabled: true
  name: "Heartbeat"
  schedule: "weekdays hourly from 09:00 to 17:00"
  timezone: "local"
  automation_path: "automations/heartbeat"
  purpose: "Regelmaessig pruefen, ob Memory, Dokumentation, offene Punkte und Projektkonventionen gepflegt sind."
